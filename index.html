<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BACKSTAGELIVE · EXP</title>

  <!-- Tipografia -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />

  <link rel="icon" href="exp-logo.ico" type="image/x-icon">
</head>
<body>

<div class="app" id="app">

  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark display">
        <img src="exp-logo_page-0001.svg" alt="EXP produções" width="34" height="34" style="filter: invert(1)" />
      </div>
      <div class="brand-text">
        <span class="brand-name">EXP&nbsp;Produção</span>
        <span class="brand-sub">Controle de Produção</span>
      </div>
    </div>

    <nav class="nav" id="nav" aria-label="Navegação principal"><!-- preenchido via JS --></nav>

    <div class="sidebar-foot">
      <button class="collapse-btn" id="collapseBtn" aria-label="Recolher menu">
        <i data-lucide="panel-left-close"></i>
        <span class="collapse-label">Recolher menu</span>
      </button>
    </div>
  </aside>

  <!-- ===================== MAIN ===================== -->
  <div class="main">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu"><i data-lucide="menu"></i></button>

      <label class="search">
        <i data-lucide="search"></i>
        <input id="searchInput" type="text" placeholder="Buscar demandas, fornecedores, itens…" aria-label="Buscar" />
        <kbd>/</kbd>
      </label>

      <div class="topbar-spacer"></div>

      <button class="icon-btn" data-toast="Nenhuma notificação nova." aria-label="Notificações">
        <i data-lucide="bell"></i><span class="dot"></span>
      </button>

      <button class="btn-new" data-toast="Cadastro de demandas chega na próxima fase.">
        <i data-lucide="plus"></i><span>Nova demanda</span>
      </button>

      <button class="user-chip" data-toast="Perfil e preferências em breve.">
        <div class="avatar">D</div>
        <div class="user-meta">
          <span class="user-name">Della</span>
          <span class="user-role">Planejamento</span>
        </div>
      </button>
    </header>

    <main class="view" id="view" role="main"><!-- preenchido via JS --></main>
  </div>

  <div class="backdrop" id="backdrop"></div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<!-- Modal — Mesas e Cadeiras (add / edit) -->
<div id="mcModal" class="modal-overlay hidden" hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="mcModalTitle">
    <div class="modal-head">
      <span class="modal-title" id="mcModalTitle">Novo registro</span>
      <button class="icon-btn" onclick="mcCloseModal()" aria-label="Fechar">
        <i data-lucide="x"></i>
      </button>
    </div>
    <input type="hidden" id="mcRowIndex" />
    <div class="form-field">
      <label class="form-label" for="mcLocal">Local</label>
      <input class="form-input" id="mcLocal" type="text" placeholder="Ex: Bar 1, Área VIP…" />
    </div>
    <div class="form-field">
      <label class="form-label" for="mcDescricao">Descrição</label>
      <input class="form-input" id="mcDescricao" type="text" placeholder="Ex: Mesa redonda com 4 cadeiras" />
    </div>
    <div class="form-row-2">
      <div class="form-field">
        <label class="form-label" for="mcMesas">Mesas</label>
        <input class="form-input" id="mcMesas" type="number" min="0" placeholder="0" />
      </div>
      <div class="form-field">
        <label class="form-label" for="mcCadeiras">Cadeiras</label>
        <input class="form-input" id="mcCadeiras" type="number" min="0" placeholder="0" />
      </div>
    </div>
    <div class="form-field">
      <label class="form-label" for="mcTipo">Tipo</label>
      <select class="form-select" id="mcTipo">
        <option value="">Selecionar tipo…</option>
        <option value="Madeira">Madeira</option>
        <option value="Plástico">Plástico</option>
      </select>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" onclick="mcCloseModal()">Cancelar</button>
      <button class="btn-primary" id="mcSubmitBtn" onclick="mcSubmitModal()">Salvar</button>
    </div>
  </div>
</div>

<!-- Confirm — exclusão de registro -->
<div id="mcConfirm" class="confirm-overlay hidden" hidden="true">
  <div class="confirm-box" role="alertdialog" aria-modal="true">
    <div class="confirm-title">Confirmar exclusão</div>
    <p class="confirm-desc" id="mcConfirmDesc"></p>
    <div class="confirm-actions">
      <button class="btn-ghost" onclick="mcCloseConfirm()">Cancelar</button>
      <button class="btn-danger" id="mcDeleteBtn" onclick="mcDoDelete()">Excluir</button>
    </div>
  </div>
</div>

<!-- Modal — Gradil e Tendas (add / edit) -->
<div id="gtModal" class="modal-overlay hidden" hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="gtModalTitle">
    <div class="modal-head">
      <span class="modal-title" id="gtModalTitle">Novo registro</span>
      <button class="icon-btn" onclick="gtCloseModal()" aria-label="Fechar">
        <i data-lucide="x"></i>
      </button>
    </div>
    <input type="hidden" id="gtRowIndex" />
    <div class="form-field">
      <label class="form-label" for="gtItem">Item</label>
      <input class="form-input" id="gtItem" type="text" placeholder="Ex: Gradil de contenção" />
    </div>
    <div class="form-field">
      <label class="form-label" for="gtPosicionamento">Posicionamento</label>
      <input class="form-input" id="gtPosicionamento" type="text" placeholder="Ex: Entrada VIP, Perímetro…" />
    </div>
    <div class="form-field">
      <label class="form-label" for="gtEstilo">Estilo</label>
      <input class="form-input" id="gtEstilo" type="text" placeholder="Ex: Piramidal, Chapelaria…" />
    </div>
    <div class="form-row-2">
      <div class="form-field">
        <label class="form-label" for="gtQuantidade">Quantidade</label>
        <input class="form-input" id="gtQuantidade" type="number" min="0" placeholder="0" />
      </div>
      <div class="form-field">
        <label class="form-label" for="gtLargura">Largura (m linear)</label>
        <input class="form-input" id="gtLargura" type="number" min="0" step="0.01" placeholder="0" />
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-field">
        <label class="form-label" for="gtComprimento">Comprimento (m linear)</label>
        <input class="form-input" id="gtComprimento" type="number" min="0" step="0.01" placeholder="0" />
      </div>
      <div class="form-field">
        <label class="form-label" for="gtAltura">Altura (m linear)</label>
        <input class="form-input" id="gtAltura" type="number" min="0" step="0.01" placeholder="0" />
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-field">
        <label class="form-label" for="gtTendas">Tendas (m²)</label>
        <input class="form-input" id="gtTendas" type="number" min="0" step="0.01" placeholder="0" />
      </div>
      <div class="form-field">
        <label class="form-label" for="gtFechamentoLonas">Fechamento lonas (m²)</label>
        <input class="form-input" id="gtFechamentoLonas" type="number" min="0" step="0.01" placeholder="0" />
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-field">
        <label class="form-label" for="gtGradil">Gradil (m linear)</label>
        <input class="form-input" id="gtGradil" type="number" min="0" step="0.01" placeholder="0" />
      </div>
      <div class="form-field">
        <label class="form-label" for="gtValorUnit">Valor unit.</label>
        <input class="form-input" id="gtValorUnit" type="number" min="0" step="0.01" placeholder="0,00" />
      </div>
    </div>
    <div class="form-field">
      <label class="form-label" for="gtValorTotal">Valor T.T.</label>
      <input class="form-input" id="gtValorTotal" type="number" min="0" step="0.01" placeholder="0,00" />
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" onclick="gtCloseModal()">Cancelar</button>
      <button class="btn-primary" id="gtSubmitBtn" onclick="gtSubmitModal()">Salvar</button>
    </div>
  </div>
</div>

<!-- Confirm — exclusão de registro (Gradil e Tendas) -->
<div id="gtConfirm" class="confirm-overlay hidden" hidden="true">
  <div class="confirm-box" role="alertdialog" aria-modal="true">
    <div class="confirm-title">Confirmar exclusão</div>
    <p class="confirm-desc" id="gtConfirmDesc"></p>
    <div class="confirm-actions">
      <button class="btn-ghost" onclick="gtCloseConfirm()">Cancelar</button>
      <button class="btn-danger" id="gtDeleteBtn" onclick="gtDoDelete()">Excluir</button>
    </div>
  </div>
</div>

<!-- Ícones -->
<script src="https://unpkg.com/lucide@latest"></script>
<script src="app.js"></script>
</body>
</html>
